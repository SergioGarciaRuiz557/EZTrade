name: Java CI with Maven

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Clonar el repositorio
    - uses: actions/checkout@v4

    # 2️⃣ Configurar JDK 23 y cache de Maven
    - name: Set up JDK 23
      uses: actions/setup-java@v4
      with:
        java-version: '23'
        distribution: 'oracle'
        cache: maven

    # 3️⃣ Build & Test del backend
    - name: Build & Test (backend)
      working-directory: EZTrade/backend
      run: mvn -B clean verify
